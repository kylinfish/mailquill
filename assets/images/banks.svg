<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675" role="img" aria-label="Mailquill 目前支援的銀行：國泰世華、聯邦、台新／Richart、玉山、富邦">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1116"/><stop offset="0.55" stop-color="#141a24"/><stop offset="1" stop-color="#1b2230"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3d9a0"/><stop offset="1" stop-color="#c99a52"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="-0.1" r="0.9">
      <stop offset="0" stop-color="#d8b26e" stop-opacity="0.16"/><stop offset="1" stop-color="#d8b26e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="675" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="675" rx="24" fill="url(#glow)"/>
  <rect x="1.5" y="1.5" width="1197" height="672" rx="22.5" fill="none" stroke="#2b3444" stroke-width="1"/>

  <!-- header -->
  <g transform="translate(455 52)">
    <circle cx="24" cy="19" r="23" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.6"/>
    <path d="M11 37 C22 28 35 14 46 2 C40 15 30 27 19 40 Z" fill="url(#gold)"/>
    <path d="M11 37 L7 46 L16 40 Z" fill="#f3d9a0"/>
    <text x="60" y="32" font-family="Georgia,'Times New Roman',serif" font-size="40" font-weight="700" fill="#f2ead9">Mail<tspan fill="url(#gold)">quill</tspan></text>
  </g>
  <text x="600" y="150" text-anchor="middle" font-family="-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="36" font-weight="800" fill="#eae5d9">目前支援的銀行</text>
  <text x="600" y="188" text-anchor="middle" font-family="-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif" font-size="19" fill="#8b95a6">信用卡電子帳單 → 自動解析、分類、出報表 · 全本地處理</text>

  <!-- 5 rows -->
  <g font-family="-apple-system,'PingFang TC','Microsoft JhengHei',sans-serif">
    <!-- 國泰世華 -->
    <g transform="translate(200 232)">
      <rect width="800" height="60" rx="14" fill="#161b24" stroke="#28303c" stroke-width="1"/>
      <circle cx="42" cy="30" r="21" fill="#0a8f4e"/>
      <text x="42" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#fff">國</text>
      <text x="80" y="38" font-size="24" font-weight="700" fill="#eae5d9">國泰世華<tspan font-family="ui-monospace,'SF Mono',monospace" font-size="16" font-weight="400" fill="#8b95a6">　Cathay · Gmail 附件 PDF</tspan></text>
      <text x="770" y="39" text-anchor="middle" font-size="22" fill="#3ddc84">✓</text>
    </g>
    <!-- 聯邦銀行 -->
    <g transform="translate(200 302)">
      <rect width="800" height="60" rx="14" fill="#161b24" stroke="#28303c" stroke-width="1"/>
      <circle cx="42" cy="30" r="21" fill="#c8102e"/>
      <text x="42" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#fff">聯</text>
      <text x="80" y="38" font-size="24" font-weight="700" fill="#eae5d9">聯邦銀行<tspan font-family="ui-monospace,'SF Mono',monospace" font-size="16" font-weight="400" fill="#8b95a6">　UBOT · Gmail 內文／附件</tspan></text>
      <text x="770" y="39" text-anchor="middle" font-size="22" fill="#3ddc84">✓</text>
    </g>
    <!-- 台新 / Richart -->
    <g transform="translate(200 372)">
      <rect width="800" height="60" rx="14" fill="#161b24" stroke="#28303c" stroke-width="1"/>
      <circle cx="42" cy="30" r="21" fill="#00a0a0"/>
      <text x="42" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#fff">台</text>
      <text x="80" y="38" font-size="24" font-weight="700" fill="#eae5d9">台新 / Richart<tspan font-family="ui-monospace,'SF Mono',monospace" font-size="16" font-weight="400" fill="#8b95a6">　Taishin · Gmail 內文／附件</tspan></text>
      <text x="770" y="39" text-anchor="middle" font-size="22" fill="#3ddc84">✓</text>
    </g>
    <!-- 玉山 -->
    <g transform="translate(200 442)">
      <rect width="800" height="60" rx="14" fill="#161b24" stroke="#28303c" stroke-width="1"/>
      <circle cx="42" cy="30" r="21" fill="#007a4d"/>
      <text x="42" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#fff">玉</text>
      <text x="80" y="38" font-size="24" font-weight="700" fill="#eae5d9">玉山銀行<tspan font-family="ui-monospace,'SF Mono',monospace" font-size="16" font-weight="400" fill="#8b95a6">　E.SUN · Gmail 附件 PDF</tspan></text>
      <text x="770" y="39" text-anchor="middle" font-size="22" fill="#3ddc84">✓</text>
    </g>
    <!-- 富邦 -->
    <g transform="translate(200 512)">
      <rect width="800" height="60" rx="14" fill="#161b24" stroke="#28303c" stroke-width="1"/>
      <circle cx="42" cy="30" r="21" fill="#1a3b8b"/>
      <text x="42" y="38" text-anchor="middle" font-size="21" font-weight="700" fill="#fff">富</text>
      <text x="80" y="38" font-size="24" font-weight="700" fill="#eae5d9">富邦銀行<tspan font-family="ui-monospace,'SF Mono',monospace" font-size="16" font-weight="400" fill="#f0b74e">　Fubon · 需手動下載 PDF</tspan></text>
      <text x="770" y="39" text-anchor="middle" font-size="22" fill="#3ddc84">✓</text>
    </g>
  </g>

  <text x="600" y="622" text-anchor="middle" font-family="-apple-system,'PingFang TC',sans-serif" font-size="18" fill="#8b95a6">更多銀行歡迎一起開源補上 · <tspan fill="#d8b26e">github.com/kylinfish/mailquill</tspan></text>
</svg>
