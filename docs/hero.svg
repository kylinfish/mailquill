<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Mailquill — your bank statements, quietly reconciled. 100% local, zero cloud.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1017"/>
      <stop offset="0.55" stop-color="#141a24"/>
      <stop offset="1" stop-color="#1b2230"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3d9a0"/>
      <stop offset="1" stop-color="#c99a52"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#d8b26e" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#d8b26e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chart" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#c99a52"/>
      <stop offset="1" stop-color="#f3d9a0"/>
    </linearGradient>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="360" rx="20" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="20" fill="url(#glow)"/>
  <rect x="1.5" y="1.5" width="1197" height="357" rx="18.5" fill="none" stroke="#2b3444" stroke-width="1"/>

  <!-- faint ledger rules -->
  <g stroke="#33405490" stroke-width="1">
    <line x1="70" y1="118" x2="1130" y2="118"/>
    <line x1="70" y1="166" x2="1130" y2="166"/>
    <line x1="70" y1="214" x2="1130" y2="214"/>
    <line x1="70" y1="262" x2="1130" y2="262"/>
  </g>
  <line x1="150" y1="70" x2="150" y2="300" stroke="#3a4a6033" stroke-width="1"/>

  <!-- ===== right vignette: envelope opening into a chart, crossed by a quill ===== -->
  <g transform="translate(792 96)">
    <!-- soft plate -->
    <rect x="-24" y="-16" width="360" height="220" rx="18" fill="#0f1420" opacity="0.55"/>

    <!-- envelope body -->
    <rect x="18" y="70" width="196" height="120" rx="10" fill="#1d2636" stroke="#3a4a60" stroke-width="1.5"/>
    <!-- open flap -->
    <path d="M18 80 L116 24 L214 80" fill="none" stroke="#4a5c78" stroke-width="1.5"/>
    <path d="M18 80 L116 132 L214 80" fill="#141b28" stroke="#3a4a60" stroke-width="1.5"/>

    <!-- rising bars emerging from the envelope -->
    <g>
      <rect x="52" y="96" width="20" height="54" rx="4" fill="#2c384c"/>
      <rect x="86" y="74" width="20" height="76" rx="4" fill="#3a4a60"/>
      <rect x="120" y="52" width="20" height="98" rx="4" fill="url(#chart)" opacity="0.85"/>
      <rect x="154" y="30" width="20" height="120" rx="4" fill="url(#chart)"/>
    </g>
    <!-- trend line + node dots (spend / refund) -->
    <polyline points="62,150 96,120 130,96 164,60" fill="none" stroke="#f3d9a0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="62" cy="150" r="5" fill="#e5484d"/>
    <circle cx="130" cy="96" r="5" fill="#46c08a"/>
    <circle cx="164" cy="60" r="5" fill="#e5484d"/>

    <!-- donut hint -->
    <g transform="translate(268 120)">
      <circle r="40" fill="none" stroke="#2c384c" stroke-width="12"/>
      <circle r="40" fill="none" stroke="url(#gold)" stroke-width="12" stroke-linecap="round"
              stroke-dasharray="150 251" transform="rotate(-90)"/>
      <circle r="40" fill="none" stroke="#46c08a" stroke-width="12" stroke-linecap="round"
              stroke-dasharray="55 251" stroke-dashoffset="-160" transform="rotate(-90)"/>
    </g>

    <!-- quill pen crossing the scene -->
    <g transform="rotate(-18 150 110)">
      <path d="M40 210 C120 150 210 70 300 4 C250 96 176 176 92 236 Z" fill="url(#gold)" opacity="0.92"/>
      <path d="M300 4 C232 78 160 152 92 236" fill="none" stroke="#8a6a30" stroke-width="1.4" opacity="0.6"/>
      <!-- nib -->
      <path d="M40 210 L26 250 L58 226 Z" fill="#f3d9a0"/>
      <path d="M40 226 L33 246" stroke="#8a6a30" stroke-width="1.4"/>
    </g>
  </g>

  <!-- ===== left: wordmark + tagline ===== -->
  <g transform="translate(84 0)">
    <text x="0" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="76" font-weight="700" fill="#f2ead9" letter-spacing="0.5">Mail<tspan fill="url(#gold)">quill</tspan></text>
    <rect x="4" y="172" width="132" height="4" rx="2" fill="url(#gold)"/>

    <text x="6" y="210" font-family="Georgia, 'Times New Roman', serif" font-size="23" fill="#c7cedb" font-style="italic">Your bank statements, quietly reconciled.</text>
    <text x="6" y="244" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#8b95a6">Gmail&#160;&#8594;&#160;parse&#160;&#8594;&#160;a private, offline finance dashboard.&#160;&#160;100%&#160;local&#160;&#183;&#160;zero&#160;cloud&#160;&#183;&#160;zero&#160;LLM.</text>

    <!-- capability chips -->
    <g font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#d8b26e">
      <rect x="6" y="270" width="132" height="30" rx="15" fill="none" stroke="#4a5c78" stroke-width="1"/>
      <text x="72" y="290" text-anchor="middle">Rule-based</text>
      <rect x="148" y="270" width="128" height="30" rx="15" fill="none" stroke="#4a5c78" stroke-width="1"/>
      <text x="212" y="290" text-anchor="middle">PDF unlock</text>
      <rect x="286" y="270" width="150" height="30" rx="15" fill="none" stroke="#4a5c78" stroke-width="1"/>
      <text x="361" y="290" text-anchor="middle">Taiwan banks</text>
    </g>
  </g>
</svg>
